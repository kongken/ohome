syntax = "proto3";

package users.v1;

import "common/v1/types.proto";

option go_package = "github.com/kongken/ohome/pkg/proto/users/v1;usersv1";

// UserService manages profile, avatar, photos and friend tabs visible on the
// User Profile screen.
//
// HTTP mapping (see api.md §2):
//   GET    /api/v1/users/me
//   PATCH  /api/v1/users/me
//   DELETE /api/v1/users/me
//   POST   /api/v1/users/me/avatar
//   POST   /api/v1/users/me/cover
//   GET    /api/v1/users/{username}
//   GET    /api/v1/users/{username}/stats
//   GET    /api/v1/users/{username}/posts
//   GET    /api/v1/users/{username}/photos
//   GET    /api/v1/users/{username}/friends
service UserService {
  rpc GetMe(GetMeRequest) returns (User);
  rpc UpdateMe(UpdateMeRequest) returns (User);
  rpc DeleteMe(DeleteMeRequest) returns (DeleteMeResponse);
  rpc GetUser(GetUserRequest) returns (User);
  rpc GetUserStats(GetUserStatsRequest) returns (UserStats);
  rpc ListUserPhotos(ListUserPhotosRequest) returns (ListUserPhotosResponse);
  rpc ListUserFriends(ListUserFriendsRequest) returns (ListUserFriendsResponse);
  rpc UpdateInterests(UpdateInterestsRequest) returns (UpdateInterestsResponse);
}

message User {
  string id = 1;
  string username = 2;
  string display_name = 3;
  string title = 4;
  string bio = 5;
  string avatar_url = 6;
  string cover_url = 7;
  string location = 8;
  repeated string interests = 9;
  UserStats stats = 10;
  bool is_following = 11;
  bool is_self = 12;
  string created_at = 13;
}

message UserStats {
  int64 followers = 1;
  int64 following = 2;
  int64 projects = 3;
}

message Photo {
  string id = 1;
  string owner_id = 2;
  string media_id = 3;
  string url = 4;
  string title = 5;
  string alt_text = 6;
  string album_id = 7;
  string created_at = 8;
}

message GetMeRequest {}
message DeleteMeRequest {}
message DeleteMeResponse {}

message UpdateMeRequest {
  optional string display_name = 1;
  optional string username = 2;
  optional string title = 3;
  optional string bio = 4;
  optional string location = 5;
  repeated string interests = 6;
  optional string avatar_media_id = 7;
  optional string cover_media_id = 8;
}

message GetUserRequest {
  string username = 1;
}

message GetUserStatsRequest {
  string username = 1;
}

message ListUserPhotosRequest {
  string username = 1;
  common.v1.PageRequest page = 2;
}
message ListUserPhotosResponse {
  repeated Photo items = 1;
  common.v1.PageResponse page = 2;
}

message ListUserFriendsRequest {
  string username = 1;
  common.v1.PageRequest page = 2;
}
message ListUserFriendsResponse {
  repeated User items = 1;
  common.v1.PageResponse page = 2;
}

message UpdateInterestsRequest {
  repeated string interests = 1; // replaces the full list
}
message UpdateInterestsResponse {
  repeated string interests = 1;
}
