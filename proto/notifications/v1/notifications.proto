syntax = "proto3";

package notifications.v1;

import "common/v1/types.proto";
import "users/v1/users.proto";

option go_package = "github.com/kongken/ohome/pkg/proto/notifications/v1;notificationsv1";

// NotificationService powers the bell icon and mobile "Alerts" tab.
//
// HTTP mapping (see api.md §8):
//   GET    /api/v1/notifications
//   GET    /api/v1/notifications/unread-count
//   POST   /api/v1/notifications/{id}/read
//   POST   /api/v1/notifications/read-all
//   DELETE /api/v1/notifications/{id}
service NotificationService {
  rpc List(ListRequest) returns (ListResponse);
  rpc UnreadCount(UnreadCountRequest) returns (UnreadCountResponse);
  rpc MarkRead(MarkReadRequest) returns (MarkReadResponse);
  rpc MarkAllRead(MarkAllReadRequest) returns (MarkAllReadResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
}

enum NotificationType {
  NOTIFICATION_TYPE_UNSPECIFIED = 0;
  NOTIFICATION_TYPE_LIKE = 1;
  NOTIFICATION_TYPE_COMMENT = 2;
  NOTIFICATION_TYPE_MENTION = 3;
  NOTIFICATION_TYPE_FOLLOW = 4;
  NOTIFICATION_TYPE_CONNECTION_REQUEST = 5;
  NOTIFICATION_TYPE_COMMUNITY_INVITE = 6;
  NOTIFICATION_TYPE_POST_SHARE = 7;
  NOTIFICATION_TYPE_SYSTEM = 8;
}

message Notification {
  string id = 1;
  NotificationType type = 2;
  users.v1.User actor = 3;
  string target_post_id = 4;
  string target_user_id = 5;
  string text = 6;
  string created_at = 7;
  string read_at = 8;
}

message ListRequest {
  bool unread = 1;
  NotificationType type = 2;
  common.v1.PageRequest page = 3;
}
message ListResponse {
  repeated Notification items = 1;
  common.v1.PageResponse page = 2;
}

message UnreadCountRequest {}
message UnreadCountResponse { int64 count = 1; }

message MarkReadRequest { string id = 1; }
message MarkReadResponse {}
message MarkAllReadRequest {}
message MarkAllReadResponse {}
message DeleteRequest { string id = 1; }
message DeleteResponse {}
